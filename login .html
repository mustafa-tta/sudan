<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - SADS</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">نظام <span>SADS الإغاثي</span></div>
        <div class="nav-links">
            <a href="index .html">الرئيسية</a>
            <a href="requests .html">طلبات الاحتياج</a>
            <a href="login .html" class="nav-cta active">دخول المنظمات</a>
        </div>
    </nav>

    <div class="container" style="max-width: 450px; margin-top: 60px;">
        <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: var(--shadow); text-align: center;">
            <h2 style="color: var(--primary-color); margin-bottom: 10px;">تسجيل الدخول</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">بوابة المنظمات الإنسانية والجهات الحكومية</p>
            
            <form onsubmit="alert('تم تسجيل الدخول بنجاح!'); window.location.href='requests.html'; return false;">
                <div class="form-group" style="text-align: right;">
                    <label>البريد الإلكتروني المعتمد</label>
                    <input type="email" placeholder="org@sudan-aid.org" required />
                </div>
                <div class="form-group" style="text-align: right;">
                    <label>كلمة المرور</label>
                    <input type="password" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">دخول للنظام</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>نظام توزيع المساعدات للنازحين في السودان <span>(SADS)</span> © 2026</p>
    </footer>

</body>
</html>
