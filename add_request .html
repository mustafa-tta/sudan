<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تقديم طلب احتياج - SADS</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">نظام <span>SADS الإغاثي</span></div>
        <div class="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="requests.html" class="active">طلبات الاحتياج</a>
            <a href="contact.html">تواصل معنا</a>
        </div>
    </nav>

    <div class="page-hero">
        <h1>📝 رفع طلب احتياج إغاثي جديد</h1>
        <p>قم بتعبئة بيانات الولاية والاحتياجات العاجلة للنازحين</p>
    </div>

    <div class="container" style="max-width: 600px;">
        <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: var(--shadow);">
            <form onsubmit="alert('تم تسجيل طلب الاحتياج بنجاح وسيتم تقييم الأولوية.'); window.location.href='requests.html'; return false;">
                <div class="form-group">
                    <label>الولاية / المنطقة</label>
                    <input type="text" placeholder="مثال: ولاية كسلا - معسكر خشم القربة" required />
                </div>
                <div class="form-group">
                    <label>نوع المساعدات المطلوبة</label>
                    <select required>
                        <option value="">اختر نوع الاحتياج...</option>
                        <option>سلال غذائية ومواد تموينية</option>
                        <option>خيم ومستلزمات إيواء</option>
                        <option>أدوية ومستلزمات طبية</option>
                        <option>مياه صالحة للشرب وإصحاح بيئي</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>مستوى الأولوية والخطورة</label>
                    <select required>
                        <option value="high">أولوية قصوى (حالة حرجة)</option>
                        <option value="medium">أولوية متوسطة</option>
                        <option value="low">أولوية عادية</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>عدد الأسر النازحة المستفيدة</label>
                    <input type="number" placeholder="مثال: 350" required />
                </div>
                <div class="form-group">
                    <label>اسم الجهة المحلية المنسقة / رقم التواصل</label>
                    <input type="text" placeholder="مثال: منظمة الإشراق - 0912345678" required />
                </div>
                <div class="form-group">
                    <label>تفاصيل إضافية عن الوضع الإنساني</label>
                    <textarea rows="4" placeholder="اكتب وصفاً موجزاً للوضع في المعسكر أو المنطقة..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">💾 إرسال الطلب للنظام</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>نظام توزيع المساعدات للنازحين في السودان <span>(SADS)</span> © 2026</p>
    </footer>

</body>
</html>
